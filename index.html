<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Downloader</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px 20px; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #log { margin-top: 20px; color: #aaa; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Скачать число &pi;</h2>
    <p>Введите количество знаков:</p>
    <input type="number" id="digits" value="100000" min="1">
    <button id="btn">Начать расчет и скачать</button>
    <div id="log">Ожидание...</div>
</div>

<script>
    // Код для фонового процесса (Worker)
    const workerBlob = new Blob([`
        onmessage = function(e) {
            const digits = e.data;
            let n = Math.ceil(digits * 10 / 3);
            let a = new Int32Array(n).fill(2); // Используем типизированный массив для скорости
            let result = "3.";

            for (let j = 0; j < digits; j++) {
                let q = 0;
                for (let i = n - 1; i > 0; i--) {
                    let x = 10 * a[i] + q * i;
                    a[i] = x % (2 * i - 1);
                    q = (x / (2 * i - 1)) | 0;
                }
                let digit = ((10 * a[0] + q) / 10) | 0;
                a[0] = (10 * a[0] + q) % 10;
                
                if (j > 0) result += digit;
                
                if (j % 5000 === 0) postMessage({type: 'progress', val: j});
            }
            postMessage({type: 'done', val: result});
        }
    `], { type: 'application/javascript' });

    const worker = new Worker(URL.createObjectURL(workerBlob));
    const btn = document.getElementById('btn');
    const log = document.getElementById('log');

    btn.onclick = () => {
        const count = parseInt(document.getElementById('digits').value);
        btn.disabled = true;
        log.innerText = "Идет расчет... Страница активна.";
        worker.postMessage(count);
    };

    worker.onmessage = (e) => {
        if (e.data.type === 'progress') {
            log.innerText = "Рассчитано: " + e.data.val + " знаков...";
        } else {
            log.innerText = "Формирование файла...";
            
            // Самый важный кусок: Инициируем скачивание
            const file = new Blob([e.data.val], { type: 'text/plain' });
            const downloadUrl = URL.createObjectURL(file);
            const a = document.createElement('a');
            
            a.href = downloadUrl;
            a.download = 'pi_number.txt'; // Имя файла
            document.body.appendChild(a);
            a.click(); // Симуляция клика
            
            // Уборка за собой
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                btn.disabled = false;
                log.innerText = "Готово! Проверьте папку 'Загрузки'.";
            }, 100);
        }
    };
</script>

</body>
</html>
