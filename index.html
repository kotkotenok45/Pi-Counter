<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Pi Downloader</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #333; }
        input { width: 80%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; background: #2c2c2e; color: #fff; font-size: 18px; text-align: center; }
        button { background: #34c759; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; color: #0a84ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Turbo &pi; Calc</h2>
    <p>Количество знаков:</p>
    <input type="number" id="digits" value="100000">
    <button id="btn">Рассчитать и Скачать</button>
    <div id="status">Готов к быстрому расчету</div>
</div>

<script>
    const workerCode = `
    onmessage = function(e) {
        const digits = e.data;
        const precision = digits + 10;
        const BigI = BigInt;

        function arctan(x, p) {
            let x2 = x * x;
            let target = BigI(10) ** BigI(p);
            let sum = target / x;
            let term = sum;
            let n = 3;
            while (true) {
                term = term / x2;
                let nextTerm = term / BigI(n);
                if (nextTerm === 0n) break;
                if ((n / 2) % 2 === 1) sum -= nextTerm;
                else sum += nextTerm;
                n += 2;
            }
            return sum;
        }

        // Формула Мачина: pi = 4 * (4*atan(1/5) - atan(1/239))
        postMessage({type: 'log', val: 'Запуск алгоритма Мачина...'});
        let p = precision + 5;
        let a = arctan(5n, p);
        postMessage({type: 'log', val: 'Часть 1/2 готова...'});
        let b = arctan(239n, p);
        postMessage({type: 'log', val: 'Часть 2/2 готова...'});
        
        let pi = 4n * (4n * a - b);
        let s = pi.toString();
        let result = s[0] + "." + s.substring(1, digits + 1);
        
        postMessage({type: 'done', val: result});
    };
    `;

    const blob = new Blob([workerCode], {type: 'application/javascript'});
    const worker = new Worker(URL.createObjectURL(blob));

    document.getElementById('btn').onclick = function() {
        const d = parseInt(document.getElementById('digits').value);
        this.disabled = true;
        document.getElementById('status').innerText = "Считаю очень быстро...";
        worker.postMessage(d);
    };

    worker.onmessage = function(e) {
        if (e.data.type === 'log') {
            document.getElementById('status').innerText = e.data.val;
        } else {
            const file = new Blob([e.data.val], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(file);
            a.download = 'pi.txt';
            a.click();
            document.getElementById('status').innerText = "Скачивание!";
            document.getElementById('btn').disabled = false;
        }
    };
</script>
</body>
</html>
